<!-- Theme Color -->
<meta name="theme-color" content="#4d6fb7">
<meta name="msapplication-TileColor" content="#4d6fb7">

<!-- Favicons -->
<link rel="icon" type="image/x-icon" href="/images/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">

<!-- Android/PWA icons -->
<link rel="icon" type="image/png" sizes="192x192" href="/images/android-chrome-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/images/android-chrome-512.png">
<link rel="manifest" href="/site.webmanifest">

<!-- Open Graph / Social Media -->
<meta property="og:image" content="{{ .Site.BaseURL }}images/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="{{ .Site.BaseURL }}images/og-image.png">

<!-- Custom NixOS-branded styles -->
{{ $style := resources.Get "css/custom.css" | minify | fingerprint }}
<link rel="stylesheet" href="{{ $style.Permalink }}" integrity="{{ $style.Data.Integrity }}">
